<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Red+Rose:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="app">
      <section id="home-screen" class="home-screen">
            <img src="/assets/controller-bg.png" alt="" class="home-screen__bg-icon">        
        <div class="home-screen__content">
          <p class="home-screen__subtitle">It's play time.</p>
          <h1 class="home-screen__title">Ready to play?</h1>
          
            <button class="btn btn--primary" id="start-game">
                <span class="btn__icon">
                    <img src="/assets/controller.png" alt="Controller">
                </span>
                Play <span class="btn__arrow">&rarr;</span>
            </button>
        </div>
      </section>

      <section id="settings-screen" class="hidden"></section>
      <section id="game-screen" class="hidden"></section>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
